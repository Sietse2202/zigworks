name: Docs

on:
  push:
    branches:
      - main

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - run: zig build docs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: zig-out/docs

      - id: deploy
        uses: actions/deploy-pages@v4
