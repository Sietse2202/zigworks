name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build library
        run: zig build

      - name: Build docs
        run: zig build docs

      - name: Create source archive
        run: |
          git archive \
            --format=tar.gz \
            --prefix=${{ github.ref_name }}/ \
            -o ${{ github.ref_name }}.tar.gz \
            ${{ github.ref }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.ref_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: zig-out/docs

      - id: deploy
        uses: actions/deploy-pages@v4
        
